services:
  genome:
    build: .
    image: genome:v0.6.0
    ports:
      - "8080:8080"
    environment:
      GENOME_STORAGE: "postgresql://genome:genome@postgres:5432/memory"
      GENOME_EMBED_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
      GENOME_CACHE_SIZE: "2048"
      # GENOME_API_KEY: "set-a-real-key-here"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: genome
      POSTGRES_PASSWORD: genome
      POSTGRES_DB: memory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genome -d memory"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
